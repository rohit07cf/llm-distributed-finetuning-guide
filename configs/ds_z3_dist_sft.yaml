### DeepSpeed ZeRO-3 Distributed SFT Configuration
### Multi-GPU distributed training with full parameter sharding

# Model
model_name_or_path: meta-llama/Meta-Llama-3-8B-Instruct
trust_remote_code: true

# Method
stage: sft
do_train: true
finetuning_type: lora

# LoRA hyperparameters
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: q_proj,v_proj,k_proj,o_proj,gate_proj,up_proj,down_proj

# Dataset
dataset: portfolio_data
dataset_dir: data
template: llama3
cutoff_len: 1024
preprocessing_num_workers: 4
overwrite_cache: true

# Training
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
max_grad_norm: 1.0

# DeepSpeed
deepspeed: configs/ds_z3_config.json

# Logging and saving
logging_steps: 10
save_steps: 100
save_total_limit: 3
output_dir: outputs/ds_z3_dist_sft
report_to: none
bf16: true

# Reproducibility
seed: 42
